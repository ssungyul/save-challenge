<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Galmuri11', monospace;
}

.card{
width:260px;
background:#000;
border:2px solid #00ff9c;
padding:18px;
text-align:center;
box-shadow:0 0 15px #00ff9c;
}

.title{
color:#00ff9c;
font-size:16px;
margin-bottom:12px;
}

button{
font-family:'Galmuri11';
background:#000;
color:#00ff9c;
border:2px solid #00ff9c;
padding:8px 14px;
cursor:pointer;
}

button:hover{
background:#00ff9c;
color:#000;
}

.result{
margin-top:14px;
color:#00ff9c;
font-size:14px;
line-height:1.4;
}

img{
margin-top:12px;
width:200px;
border:2px solid #00ff9c;
display:block;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<div class="card">

<div class="title">[ SAVE CHALLENGE ]</div>

<button onclick="draw()">운세 뽑기</button>

<div class="result" id="text"></div>

<img id="image" style="display:none">

</div>

<script>

function draw(){

let r = Math.random()

let text = ""
let img = ""

if(r < 0.225){

text = "☕ 오늘은 커피 참기!!"
img = "https://ssungyul.github.io/save-challenge/coffee.png"

}

else if(r < 0.45){

text = "🍺 오늘 혹시 술 땡겼어?!"
img = "https://ssungyul.github.io/save-challenge/alchol.png"

}

else if(r < 0.675){

text = "🚬 이제 노담 가보자!"
img = "https://ssungyul.github.io/save-challenge/cigarette.png"

}

else if(r < 0.9){

text = "🥐 빵이 라면보다 더 살찐대!"
img = "https://ssungyul.github.io/save-challenge/bread.png"

}

else{

text = "🎉 오늘은 자유의 날! 추카추카!"
img = "https://ssungyul.github.io/save-challenge/free.png"

}

document.getElementById("text").innerText = text

let image = document.getElementById("image")
image.src = img
image.style.display = "block"

}

</script>

</body>
</html>
