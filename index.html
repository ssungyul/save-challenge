<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body{
margin:0;
font-family:Arial;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff7ed;
padding:20px;
border-radius:18px;
width:260px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title{
font-weight:700;
margin-bottom:10px;
}

.jar{
position:relative;
width:140px;
height:180px;
margin:0 auto;
}

.outline{
position:absolute;
z-index:3;
}

.fill{
position:absolute;
bottom:22px;
left:22px;
width:96px;
height:0%;
background:linear-gradient(#fdba74,#f97316);
border-radius:0 0 28px 28px;
transition:height 1s ease;
z-index:1;
}

.coin{
position:absolute;
font-size:18px;
top:-10px;
left:60px;
opacity:0;
animation:drop 1.2s ease forwards;
}

@keyframes drop{
0%{transform:translateY(-20px);opacity:0}
40%{opacity:1}
100%{transform:translateY(80px);opacity:0}
}

.progress{
margin-top:10px;
font-size:14px;
}

.bar{
height:10px;
background:#fde7cf;
border-radius:10px;
margin-top:6px;
overflow:hidden;
}

.barfill{
height:100%;
background:#f97316;
width:0%;
transition:width 1s;
}

.amount{
margin-top:8px;
font-size:13px;
color:#555;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🍊 썬귤 저금통</div>

<div class="jar">

<div class="coin">🪙</div>

<div class="fill" id="fill"></div>

<svg class="outline" width="140" height="180">
<path d="M20 40
Q20 10 70 10
Q120 10 120 40
L120 140
Q120 170 70 170
Q20 170 20 140 Z"
fill="none"
stroke="#f97316"
stroke-width="6"/>
</svg>

</div>

<div class="progress">

<b id="percent">0%</b>

<div class="bar">
<div class="barfill" id="barfill"></div>
</div>

</div>

<div class="amount">
<span id="saved"></span> / <span id="goal"></span> 원
</div>

</div>

<script>

let saved = 40000
let goal = 100000

let percent = Math.min((saved/goal)*100,100)

document.getElementById("fill").style.height = percent+"%"
document.getElementById("barfill").style.width = percent+"%"
document.getElementById("percent").innerText = Math.round(percent)+"%"

document.getElementById("saved").innerText =
saved.toLocaleString()

document.getElementById("goal").innerText =
goal.toLocaleString()

</script>

</body>
</html>
