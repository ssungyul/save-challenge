<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">

<style>

body{
margin:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Galmuri11', monospace;
}

.card{
width:260px;
background:#000;
border:2px solid #00ff9c;
padding:18px;
text-align:center;
box-shadow:0 0 15px #00ff9c;
}

.title{
color:#00ff9c;
font-size:16px;
margin-bottom:12px;
}

button{
font-family:'Galmuri11';
background:#000;
color:#00ff9c;
border:2px solid #00ff9c;
padding:8px 14px;
cursor:pointer;
}

button:hover{
background:#00ff9c;
color:#000;
}

.result{
margin-top:14px;
color:#00ff9c;
font-size:14px;
line-height:1.5;
min-height:40px;
}

/* 고양이 이미지 */
.cat{
margin-top:12px;
width:120px;
display:block;
margin-left:auto;
margin-right:auto;
image-rendering: pixelated;
}

img{
margin-top:12px;
width:200px;
border:2px solid #00ff9c;
display:block;
margin-left:auto;
margin-right:auto;
}

</style>

</head>

<body>

<div class="card">

<div class="title">[ SAVE CHALLENGE ]</div>

<button onclick="draw()">운세 뽑기</button>

<!-- 픽셀 고양이 -->
<img class="cat" id="cat" src="https://ssungyul.github.io/save-challenge/pixel-cat.png">

<div class="result" id="text"></div>

<img id="image" style="display:none">

</div>

<script>

function typeWriter(text){

let i = 0
let speed = 40

document.getElementById("text").innerHTML=""

function typing(){

if(i < text.length){

document.getElementById("text").innerHTML += text.charAt(i)
i++
setTimeout(typing, speed)

}

}

typing()

}

function beep(){

let ctx = new AudioContext()
let oscillator = ctx.createOscillator()

oscillator.type = "square"
oscillator.frequency.setValueAtTime(800, ctx.currentTime)

oscillator.connect(ctx.destination)
oscillator.start()

setTimeout(()=>oscillator.stop(),120)

}

function draw(){

document.getElementById("text").innerHTML="> 운세 계산중..."

document.getElementById("image").style.display="none"

/* 고양이 숨기기 */
document.getElementById("cat").style.display="none"

beep()

setTimeout(()=>{

let r = Math.random()

let text = ""
let img = ""

if(r < 0.225){

text = "> 오늘은 커피 참기!!"
img = "https://ssungyul.github.io/save-challenge/coffee.png"

}

else if(r < 0.45){

text = "> 오늘 혹시 술 땡겼어?!"
img = "https://ssungyul.github.io/save-challenge/alchol.png"

}

else if(r < 0.675){

text = "> 이제 노담 가보자!"
img = "https://ssungyul.github.io/save-challenge/cigarette.png"

}

else if(r < 0.9){

text = "> 빵이 라면보다 더 살찐대!"
img = "https://ssungyul.github.io/save-challenge/bread.png"

}

else{

text = "> 오늘은 자유의 날! 추카추카!"
img = "https://ssungyul.github.io/save-challenge/free.png"

}

typeWriter(text)

let image = document.getElementById("image")

image.src = img

image.style.display = "block"

},700)

}

</script>

</body>
</html>
